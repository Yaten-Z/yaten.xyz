<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的链接收藏</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #1a1a1a;
            margin: 0;
            padding: 20px;
            color: #e0e0e0;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            color: #7fdbff;
            margin-bottom: 30px;
            font-weight: 300;
            letter-spacing: 1px;
        }
        
        .links-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        
        .link-box {
            background-color: #2d2d2d;
            border-radius: 8px;
            padding: 18px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            border-left: 4px solid #7fdbff;
            transition: transform 0.2s ease;
        }
        
        .link-box:hover {
            transform: translateY(-3px);
        }
        
        .link-title {
            font-size: 1.2em;
            margin: 0 0 12px 0;
            color: #7fdbff;
            padding-bottom: 8px;
            border-bottom: 1px solid #3d3d3d;
            font-weight: 500;
        }
        
        .link-list {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }
        
        .link-list li {
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px dashed #3d3d3d;
        }
        
        .link-list li:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }
        
        .link-list a {
            text-decoration: none;
            color: #7fdbff;
            display: block;
            padding: 5px 0;
            transition: color 0.2s;
        }
        
        .link-list a:hover {
            color: #b6e6ff;
            text-decoration: underline;
        }
        
        .link-description {
            font-size: 0.85em;
            color: #a0a0a0;
            margin-top: 3px;
            line-height: 1.4;
        }
        
        @media (max-width: 600px) {
            .links-container {
                grid-template-columns: 1fr;
            }
            
            .link-box {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Links from Yaten-Z</h1>
        
        <div class="links-container">
            <!-- 第一个链接盒子 -->
            <div class="link-box">
                <h2 class="link-title">个人主页 & Blog网页</h2>
                <ul class="link-list">
                    <li>
                        <a href="https://yaten.xyz" target="_blank">Yaten-Z's home</a>
                        <div class="link-description">Yaten-Z的主页</div>
                    </li>
                    <li>
                        <a href="https://blog.yaten.xyz" target="_blank">博客主页「落鲸」</a>
                        <div class="link-description">「用符号雕刻时间，用逻辑照亮未知」</div>
                    </li>
                    <li>
                        <a href="https://github.com/Yaten-Z/" target="_blank">Github主页</a>
                        <div class="link-description">有空来看看</div>
                    </li>
                </ul>
            </div>
            
            <!-- 第二个链接盒子 -->
            <div class="link-box">
                <h2 class="link-title">Game</h2>
                <ul class="link-list">
                    <li>
                        <a href="https://yaten.xyz/game/snake.html" target="_blank">贪吃蛇</a>
                        <div class="link-description">看看你有多少积分·_·</div>
                    </li>
                </ul>
            </div>
            
            <!-- 第三个链接盒子 -->
            <div class="link-box">
                <h2 class="link-title">其他网页</h2>
                <ul class="link-list">
                    <li>
                        <a href="https://yaten.xyz/book.html" target="_blank">书库</a>
                        <div class="link-description">知识的殿堂（啥也没有）</div>
                    </li>
                    <li>
                        <a href="https://yaten.xyz/pay.html" target="_blank">Support me</a>
                        <div class="link-description">给我点杯咖啡☕</div>
                    </li>
                    <li>
                        <a href="https://blog.yaten.xyz/link" target="_blank">友链</a>
                        <div class="link-description">Be Friend Forever</div>
                    </li>
                    <li>
                        <a href="https://yaten.xyz/useful-links.html" target="_blank">实用链接收藏</a>
                        <div class="link-description">Useful And Fast</div>
                    </li>
                </ul>
            </div>
            
            <!-- 可以添加第四个空盒子保持对称 -->
            <div class="link-box" style="border-left-color: transparent; background-color: transparent; box-shadow: none;">
                <!-- 空白盒子保持布局平衡 -->
            </div>
        </div>
    </div>
</body>
</html>
