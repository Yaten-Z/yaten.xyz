<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>📚电子书库</title>
  <link rel="stylesheet" href="https://chinese-fonts-cdn.deno.dev/packages/syst/dist/SourceHanSerifCN/result.css" />
  <style>
    :root {
      --bg: #0b131d;
      --text-color: #e8e6e3;
      --link-color: gray;
      --card-bg: #1c1c1c;
      --card-hover: #2a2a2a;
      --primary: #4a6fa5;
    }

    body {
      margin: 0;
      padding: 2rem 1rem;
      background-color: var(--bg);
      color: var(--text-color);
      font-family: 'Source Han Serif CN', serif;
      font-size: 1.1rem;
      line-height: 1.6;
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      animation: fadeIn 1.5s ease forwards;
      opacity: 0;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .search-container {
      max-width: 500px;
      margin: 0 auto 2rem;
    }

    #searchInput {
      width: 100%;
      padding: 0.8rem 1rem;
      border-radius: 25px;
      border: none;
      background-color: #2a2a2a;
      color: var(--text-color);
      font-family: inherit;
      font-size: 1rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 1.5rem;
    }

    .book-item {
      background-color: var(--card-bg);
      border-radius: 8px;
      padding: 1rem;
      text-align: center;
      color: var(--text-color);
      text-decoration: none;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .book-item:hover {
      transform: translateY(-6px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
      background-color: var(--card-hover);
    }

    .book-cover-container {
      position: relative;
      width: 100%;
      padding-top: 140%; /* 保持封面图片比例 */
      margin-bottom: 1rem;
      overflow: hidden;
      border-radius: 4px;
      background: #444;
    }

    .book-cover {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .book-title {
      font-size: 1rem;
      line-height: 1.4;
      margin-top: auto;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .book-author {
      font-size: 0.85rem;
      color: #aaa;
      margin-top: 0.5rem;
    }

    .category-filter {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .category-btn {
      padding: 0.5rem 1rem;
      border-radius: 20px;
      background-color: var(--card-bg);
      border: none;
      color: var(--text-color);
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .category-btn:hover, .category-btn.active {
      background-color: var(--primary);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        filter: blur(4px);
      }
      to {
        opacity: 1;
        filter: blur(0);
      }
    }

    @media (max-width: 768px) {
      .grid {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 1rem;
      }

      .grid {
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
        gap: 1rem;
      }

      .book-cover-container {
        padding-top: 130%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>电子书库</h1>
      <p>收藏您喜爱的电子书籍和文档</p>
    </header>

    <div class="search-container">
      <input type="text" id="searchInput" placeholder="搜索书籍..." />
    </div>

    <div class="category-filter">
      <button class="category-btn active" data-category="all">全部</button>
      <button class="category-btn" data-category="math">数学</button>
      <button class="category-btn" data-category="programming">编程</button>
      <button class="category-btn" data-category="tools">工具</button>
    </div>

    <div class="grid" id="bookContainer"></div>
  </div>

  <script>
    const books = [
      {
        "id": 1,
        "title": "大规模C++程序设计",
        "author": "John Lakos",
        "cover": "https://s1.imagehub.cc/images/2025/06/22/0cbe564d36c718e86b389d5e93326eb0.png",
        "pdf": "pdf/大规模C++程序设计.pdf",
        "category": "programming"
      }
    ];

    // 渲染书籍列表
    function renderBooks(bookList = books) {
      const container = document.getElementById('bookContainer');
      container.innerHTML = bookList.map(book => `
        <a href="${book.pdf}" class="book-item" target="_blank" data-category="${book.category}">
          <div class="book-cover-container">
            <img src="${book.cover}" alt="${book.title}" class="book-cover"
                 onerror="this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiB2aWV3Qm94PSIwIDAgMzAwIDMwMCIgZmlsbD0iI0NDQyIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48dGV4dCB4PSI1MCUiIHk9IjUwJSIgZm9udC1mYW1pbHk9IkFyaWFsIiBmb250LXNpemU9IjE2IiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBhbGlnbm1lbnQtYmFzZWxpbmU9Im1pZGRsZSIgZmlsbD0iIzY2NiI+PG1wYWlyPjxzdHJvbmc+${encodeURIComponent(book.title)}PC9zdHJvbmc+PC9tcGFpcj48L3RleHQ+PC9zdmc+'"/>
          </div>
          <div class="book-title">${book.title}</div>
          ${book.author ? `<div class="book-author">${book.author}</div>` : ''}
        </a>
      `).join('');
    }

    // 搜索功能
    document.getElementById('searchInput').addEventListener('input', function(e) {
      const searchTerm = e.target.value.toLowerCase();
      const filteredBooks = books.filter(book => 
        book.title.toLowerCase().includes(searchTerm) || 
        (book.author && book.author.toLowerCase().includes(searchTerm))
      );
      renderBooks(filteredBooks);
    });

    // 分类筛选
    document.querySelectorAll('.category-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        
        const category = this.dataset.category;
        if (category === 'all') {
          renderBooks();
        } else {
          const filteredBooks = books.filter(book => book.category === category);
          renderBooks(filteredBooks);
        }
      });
    });

    window.addEventListener('DOMContentLoaded', renderBooks);
  </script>
</body>
</html>
