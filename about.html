<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"
    />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/about.css" />
    <link rel="icon" href="https://s1.imagehub.cc/images/2025/08/10/db218f6882b872ebce720b7e53236bd5.png" size="32*32">
    <title>关于我 - Yaten-Z</title>
  </head>
  <body>
    <!-- 主题切换按钮 -->
    <div class="theme-toggle">
      <button id="themeToggle" aria-label="切换主题">
        <i class="fas fa-sun"></i>
      </button>
    </div>

    <!-- 导航栏 -->
    <div class="nav">
      <a href="./index.html">
        <i class="fas fa-arrow-left"></i>
        返回首页
      </a>
    </div>

    <div class="container">
      <!-- 头部区域 -->
      <div class="header">
        <img
          class="avatar"
          src="https://s1.imagehub.cc/images/2025/07/30/93b3e11a33c2741a3e254bccabb47739.jpg"
          alt="头像"
        />
        <h1>Yaten-Z</h1>
        <p class="intro">等那场风，等那个你</p>
        <p>一个喜欢敲代码、听音乐、学点数学的普通初三生</p>
      </div>

      <!-- 内容区域 -->
      <div class="content">
        <!-- 特长技能 -->
        <div class="section">
          <h2><i class="fas fa-code"></i> 特长技能</h2>
          <div class="skills-grid">
            <div class="skill-item">
              <i class="fab fa-python"></i>
              <h3>Python</h3>
              <div class="skill-progress">
                <div class="progress-bar">
                  <div class="progress-fill" data-progress="50"></div>
                </div>
                <span class="progress-text">50%</span>
              </div>
            </div>
            <div class="skill-item">
              <i class="fab fa-js-square"></i>
              <h3>JavaScript</h3>
              <div class="skill-progress">
                <div class="progress-bar">
                  <div class="progress-fill" data-progress="20"></div>
                </div>
                <span class="progress-text">20%</span>
              </div>
            </div>
            <div class="skill-item">
              <i class="fab fa-html5"></i>
              <h3>Web</h3>
              <div class="skill-progress">
                <div class="progress-bar">
                  <div
                    class="progress-fill"
                    data-progress="30
                  "
                  ></div>
                </div>
                <span class="progress-text">30%</span>
              </div>
            </div>
            <div class="skill-item">
              <i class="fas fa-calculator"></i>
              <h3>数学</h3>
              <div class="skill-progress">
                <div class="progress-bar">
                  <div class="progress-fill" data-progress="30"></div>
                </div>
                <span class="progress-text">30%</span>
              </div>
            </div>
            <div class="skill-item">
              <i class="fab fa-linux"></i>
              <h3>Linux</h3>
              <div class="skill-progress">
                <div class="progress-bar">
                  <div class="progress-fill" data-progress="20"></div>
                </div>
                <span class="progress-text">20%</span>
              </div>
            </div>
            <div class="skill-item">
              <i class="fas fa-database"></i>
              <h3>竞赛算法</h3>
              <div class="skill-progress">
                <div class="progress-bar">
                  <div class="progress-fill" data-progress="75"></div>
                </div>
                <span class="progress-text">75%</span>
              </div>
            </div>
          </div>
        </div>

        <!-- GitHub贡献 -->
        <!-- GitHub贡献 -->
        <div class="section">
          <h2><i class="fab fa-github"></i> GitHub 贡献</h2>
          <img
            id="githubCard"
            src="https://github-profile-summary-cards.vercel.app/api/cards/profile-details?username=Yaten-Z"
            width="100%"
            alt="GitHub Summary"
          />
          <div class="github-link">
            <a href="https://github.com/Yaten-Z" target="_blank">
              <i class="fab fa-github"></i>
              访问我的 GitHub
            </a>
          </div>
        </div>
      </div>
    </div>

    <footer>
      &copy; 2025 Yaten-Z. All rights reserved.
      <br />
      <a href="./copyright.html">Copyright</a> - Yaten-Z
    </footer>

    <script src="js/theme.js"></script>
    <script src="js/skills-progress.js"></script>
  </body>
</html>
